learned_rules:
  ? page.locator(".custom-checkbox-wrapper.overflow-hidden.d-flex.justify-content-center.m-r-8.pointer.white-background-color
    > .pointer").first.click()
  : 'This particular action shows that the ''Select All'' button was clicked, since
    all the products were already selected before, this action deselects every product.
    As a result, the filter cannot be applied, since there are no products selected
    currently. Therefore, the ''apply'' button becomes disabled until the user selects
    one or more products again. '
  page.locator(".d-flex.flex-column.justify-content-center").first.click(): This action
    displays the 'Select All' button being clicked. This can be verified by the blue
    checkboxes highlighting all the rows that have been selected. The dropdown DOES
    NOT close on its own. Even though 'Select All' has been checked, the grid will
    not YET display all rows until the user closes up the row drop down first.
