global_rules: []
learned_rules:
  page.get_by_role("button", name="Apply Filters").click(): The 'Apply Filters' action
    is incredibly heavy, trigerring a massive full scale page reload, firing off several
    API requests and loading multiple grids. In this particular action, it is highly
    likely to see a loading screen, or a spinner icon in the middle of the screen.
    This is NOT a BUG, it shows that the page reload is happening as expected.
  page.locator(".dropdown-caret.p-l-16").first.click(): This particular action shows
    the 'Game Day' option being selected from a dropdown. The UI however does not
    YET apply this change, because the blue color 'Apply button' has not been clicked.
    Once the option is selected, the UI does NOT immediately change, only after the
    apply button is clicked does the UI trigger changes in the grids and graph data.
    This is NOT a BUG.
  page.locator(".d-flex.flex-column.justify-content-center").first.click(): 'This
    action shows the trends graph with different measures, color coded. A legend of
    the graph depicts which measure is which color. The particular action here shows
    clicking the ''''% Change vs LLY'' measure. If the measure is checked, it is represented
    as a new line in the graph with its distinct color. If the measure is unchecked,
    it means that particular measure has been hidden from the graph. In order to debug
    this properly, first look at the color coding of the measures and identify whether
    the correct measures are being shown on the graph. '
  ? page.locator(".d-flex.flex-column.justify-content-center.font-size-10.align-items-center.checkbox-v2.m-r-10.deselected").first.click()
  : This action shows the trends graph with different measures, color coded. A legend
    of the graph depicts which measure is which color. The particular action here
    shows clicking the ''% Change vs LLY' measure. If the measure is checked, it is
    represented as a new line in the graph with its distinct color. If the measure
    is unchecked, it means that particular measure has been hidden from the graph.
    In order to debug this properly, first look at the color coding of the measures
    and identify whether the correct measures are being shown on the graph. Look in
    detail at the lines depicted on the graph, the number of lines should change,
    the position and shape of the lines must be given EXTRA attention. Use maximum
    reasoning.
  page.get_by_role("checkbox", name="Press SPACE to toggle visibility (hidden)").check(): Clicking
    on Sep-26 Column will show it selected with a blue checkbox or unselected with
    no blue checkbox. There is no other major UI state change apart from this.
  ? page.locator(".ag-row-no-focus > .ag-cell-value.ag-cell.ag-cell-not-inline-editing.ag-cell-normal-height.ag-column-first
    > .ag-cell-wrapper > .ag-group-contracted > .ag-icon").first.click()
  : 'this action expands the MENS row, there is no further UI state change expected
    from this action. Verify that the MENS row has expanded. '
